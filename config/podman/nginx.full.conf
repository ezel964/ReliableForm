# ReliableForm load balancer for the full-stack podman path.
#
# Mounted into the nginx container at /etc/nginx/nginx.conf. Unlike the host
# build (rendered from config/nginx.conf.template with {{...}} tokens), this
# is static: upstreams are the compose SERVICE NAMES (web1/web2/status), the
# app code is mounted read-only at /app, and logs go to the container's
# stdout/stderr. The web tier is FPM-only here (fastcgi_pass to :9000).

worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    types {
        text/html html htm;
        text/css css;
        application/javascript js;
        application/json json;
        image/png png;
        image/jpeg jpg jpeg;
        image/svg+xml svg;
        image/x-icon ico;
        application/pdf pdf;
        text/plain txt;
        font/woff2 woff2;
    }
    default_type application/octet-stream;

    log_format sre '$remote_addr [$time_local] "$request" $status $body_bytes_sent '
                   'rt=$request_time upstream=$upstream_addr urt=$upstream_response_time '
                   'rid=$request_id';
    access_log /dev/stdout sre;

    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 2m;

    upstream web_backend {
        least_conn;
        server web1:9000 max_fails=3 fail_timeout=5s;
        server web2:9000 max_fails=3 fail_timeout=5s;
    }

    server {
        listen 80;
        server_name _;

        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;

        location = /favicon.ico {
            access_log off;
            return 204;
        }

        location /assets/ {
            root /app/apps/web/public;
            expires 5m;
        }

        location /build/ {
            root /app/frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location /status {
            proxy_pass http://status:9301;
        }
        location /api/ {
            proxy_pass http://status:9301;
        }

        # FastCGI params, spelled out inline (no system fastcgi_params file).
        # SCRIPT_FILENAME is ALWAYS the front controller; routing is on
        # REQUEST_URI inside index.php.
        fastcgi_connect_timeout 3s;
        fastcgi_read_timeout 15s;
        fastcgi_send_timeout 15s;
        fastcgi_param SCRIPT_FILENAME /app/apps/web/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param GATEWAY_INTERFACE CGI/1.1;
        fastcgi_param SERVER_SOFTWARE nginx;
        fastcgi_param HTTP_X_REQUEST_ID $request_id;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;

        # Per-pool health probes (one specific pool each, not the upstream).
        location = /__pool/web1/healthz {
            fastcgi_pass web1:9000;
            fastcgi_param SCRIPT_FILENAME /app/apps/web/public/index.php;
            fastcgi_param REQUEST_METHOD $request_method;
            fastcgi_param SERVER_PROTOCOL $server_protocol;
            fastcgi_param REQUEST_URI /healthz;
        }
        location = /__pool/web2/healthz {
            fastcgi_pass web2:9000;
            fastcgi_param SCRIPT_FILENAME /app/apps/web/public/index.php;
            fastcgi_param REQUEST_METHOD $request_method;
            fastcgi_param SERVER_PROTOCOL $server_protocol;
            fastcgi_param REQUEST_URI /healthz;
        }

        location / {
            fastcgi_pass web_backend;
            fastcgi_next_upstream error timeout;
        }
    }
}
