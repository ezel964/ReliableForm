; ReliableForm PHP-FPM pool for the full-stack podman path.
; One pool per container (web1 / web2 are separate containers), listening on
; :9000 for nginx fastcgi_pass. clear_env=no lets the container environment
; set by compose (INSTANCE_ID, DB_HOST, REDIS_HOST, QUEUE_DRIVER, ...) reach
; the PHP app, which reads them via getenv() in lib/Config.php.
[www]
listen = 9000
clear_env = no

pm = dynamic
pm.max_children = 6
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
; Same SLI surface as host mode — reachable through the LB per-pool routes.
pm.status_path = /fpm-status

request_slowlog_timeout = 2s
slowlog = /proc/self/fd/2
catch_workers_output = yes
php_admin_flag[display_errors] = off

; Log to the container's stderr so `podman logs` shows FPM output.
access.log = /proc/self/fd/2
